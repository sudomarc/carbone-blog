# GitHub Actions workflow to run the Automated Blog Generator
name: Auto Blog Publisher

on:
  schedule:
    # Run once every 3 days at 09:00 UTC (or customize as desired)
    - cron: '0 9 */3 * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Blog Generator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python generate.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ index.html
          git diff-index --quiet HEAD || (git commit -m "Auto-published a new blog post [skip ci]" && git push)
