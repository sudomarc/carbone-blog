<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{POST_PLAIN_TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="dns-prefetch" href="https://fonts.googleapis.com"/>
<link rel="dns-prefetch" href="https://fonts.gstatic.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
<script>
  (function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  })();
</script>
</head>
<body>

<header>
  <a href="../index.html" class="logo-mark">Carbone<span>.</span>Notes</a>
  <div class="logo-sub">by Carbone</div>
  <nav>
    <a href="../index.html">Archive</a>
    <a href="../about.html">About</a>
    <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
      <!-- Sun icon -->
      <svg class="sun-icon" style="display: none;" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
      <!-- Moon icon -->
      <svg class="moon-icon" style="display: none;" viewBox="0 0 24 24"><path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.6-.1 1.2.3 1.3.9.1.6-.2 1.2-.8 1.4-3.1 1.1-5.3 4.1-5.3 7.5 0 4.4 3.6 8 8 8 3.4 0 6.4-2.2 7.5-5.3.2-.6.8-.9 1.4-.8.6.1 1 .7.9 1.3C21.2 18.5 17.1 22 12.3 22z"/></svg>
    </button>
  </nav>
</header>

<main>
  <div class="article-wrap">

    <!-- POST METADATA -->
    <div class="article-eyebrow">
      <span class="article-tag">{{POST_TAG}}</span>
      <div class="article-dot"></div>
      <span class="article-date">{{POST_DATE}}</span>
    </div>

    <!-- POST TITLE -->
    <h1 class="article-title">{{POST_TITLE}}</h1>

    <!-- POST IMAGE -->
    {{POST_IMAGE}}

    <!-- POST BODY — write your content below -->
    <div class="article-body">
      {{POST_BODY}}
      <hr/>

      <!-- BACK NAVIGATION -->
      <a href="../index.html" class="back-link">← Back to all posts</a>

    </div>
  </div>
</main>

<footer>
  <div class="footer-brand">Carbone<span>.</span>Notes</div>
  <div class="footer-note" style="display: flex; gap: 1rem; align-items: center;">
    <a href="../feed.xml" style="color: var(--gray); font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; text-decoration: underline;">RSS Feed</a>
    <span>|</span>
    <span>Part of the Carbone ecosystem</span>
  </div>
</footer>

<script>
  (function() {
    const themeToggle = document.getElementById('theme-toggle');
    if (!themeToggle) return;

    const sunIcon = themeToggle.querySelector('.sun-icon');
    const moonIcon = themeToggle.querySelector('.moon-icon');

    function updateToggleIcons() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
    }

    updateToggleIcons();

    themeToggle.addEventListener('click', function() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      updateToggleIcons();
    });
  })();
</script>
</body>
</html>
